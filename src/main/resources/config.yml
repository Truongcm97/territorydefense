# ------------------------------------------------------------------------------
# 2. HỆ THỐNG NĂNG LƯỢNG THỰC PHẨM (FEP - FOOD ENERGY POINTS)
# ------------------------------------------------------------------------------
fep-settings:
  # Tốc độ tiêu thụ FEP cơ bản (FEP/giờ) khi hòa bình
  base-decay-rate-per-hour: 2.0

  # Quy đổi giá trị calo từ thực phẩm nạp vào hệ thống
  conversion:
    raw: 4.0       # Lúa mì, Khoai tây, Cà rốt thô...
    cooked: 20.0    # Thịt chín các loại...
    premium: 100.0  # Cà rốt vàng, vật phẩm đặc biệt...

  # Cơ chế nạp giáp ảo (Shield HP) từ FEP
  shield-generation:
    ratio: 10.0                     # 1 FEP = 10 Giáp ảo
    max-recharge-rate-per-second: 100.0 # Tránh hồi máu quá nhanh bất tử trong PvP

  # Ngưỡng % FEP tối thiểu để kích hoạt tự động chuyển hóa thực phẩm → FEP.
  # Thực phẩm trong Kho Thực Phẩm Lõi chỉ bị tiêu khi FEP xuống dưới mức này.
  # Mặc định 95.0 = chỉ convert khi FEP < 95% capacity, tránh tiêu 1 item/giây
  # chỉ để bù mức decay rất nhỏ (~0.0005 FEP/giây với rate 2.0 FEP/giờ).
  auto-convert-threshold-percent: 95.0


