# ------------------------------------------------------------------------------
# 6. CƠ CHẾ CAN THIỆP PVE RAID (MONSTER WAVES & DROP RATE)
# ------------------------------------------------------------------------------
raid-settings:
  auto-cycle-hours: 2.0
  delay-between-waves-seconds: 10
  # Hạ xuống 15% để khuyến khích teamwork (30% quá cao nếu đi đông người)
  min-damage-contribution-percent: 15.0
  max-shard-multiplier: 5

  # Cơ chế tăng thưởng theo số lượt raid đã hoàn thành của Lõi (completedRaids)
  reward-scaling:
    # Hệ số nhân thưởng tiền xu cơ bản từ quái vật Raid (ví dụ: 2.0 = nhân đôi 100% tiền xu nhận được)
    coin-reward-multiplier: 2.0
    # Tỉ lệ tăng tiền thưởng xu thêm mỗi lượt hoàn thành (ví dụ 0.02 = +2% mỗi lượt, chỉ áp dụng khi scale-coins-with-difficulty-multiplier là false)
    coin-increase-per-raid: 0.02
    # Nhân trực tiếp tiền thưởng xu với hệ số sức mạnh quái (getPermanentRaidMultiplier()) giúp tương thích hoàn hảo độ khó quái
    scale-coins-with-difficulty-multiplier: true
    # Số lượt raid hoàn thành để được nhận thêm 1 Shard chắc chắn (ví dụ: 10 lượt -> +1 Shard, 20 lượt -> +2 Shards)
    shards-bonus-interval: 10

  # Cơ chế tăng dần độ khó (Progressive Difficulty Scaling)
  difficulty-scaling:
    # Sức mạnh quái công thành tăng thêm vĩnh viễn sau mỗi đợt bảo vệ thành công (0.02 = +2% HP & Dmg vĩnh viễn)
    permanent-increase-per-win: 0.02

    # Giới hạn trần sức mạnh vĩnh viễn tối đa của quái (mặc định: tối đa x3.0 lần sức mạnh ban đầu)
    max-permanent-multiplier: 3.0

    # Công thức tính Chỉ số Mối đe dọa (Overall Threat Rating - OTR)
    otr-formula:
      # Hệ số đóng góp từ số lượng tháp xây dựng (mặc định: 0.5 mỗi tháp)
      tower-count-weight: 0.5
      # Hệ số đóng góp từ tổng cấp độ tháp canh (mặc định: 0.2 mỗi cấp)
      tower-level-weight: 0.2
      # Hệ số đóng góp từ số trận raid đã bảo vệ thành công (mặc định: 0.02 mỗi lượt)
      completed-raids-weight: 0.02

    # Điều chỉnh tỉ lệ thuộc tính quái vật theo điểm OTR
    otr-multipliers:
      # Tỉ lệ tăng máu quái công thành (+0.06 = +6% HP mỗi điểm OTR)
      hp-increase-per-otr: 0.06
      # Tỉ lệ tăng sát thương/giáp quái công thành (+0.04 = +4% Dmg/Armor mỗi điểm OTR)
      damage-increase-per-otr: 0.04
      # Cấu hình số lượng quái vật sinh ra trong đợt Raid theo điểm OTR
      spawn-quantity:
        base: 15
        weight-per-otr: 2.5
        min-limit: 10
        max-limit: 60

  static-multiplier:
    1: 1.00
    2: 1.25
    3: 1.60
    4: 2.10
    5: 3.00

  dynamic-multiplier:
    1: 1.20
    2: 1.30
    3: 1.50

  purchase-costs:
    1: 500000.0
    2: 1000000.0
    3: 2500000.0

  skip-costs:
    1: 200000.0
    2: 500000.0
    3: 1000000.0

  # --- Cơ chế thời gian Wave ---
  # Số tick chờ giữa 2 wave liên tiếp (900 ticks = 45 giây)
  wave-delay-ticks: 900
  # Giới hạn thời gian tối đa mỗi wave (phút) — quá giờ tính là thua
  wave-duration-limit-minutes: 10

  # --- Cơ chế Spawn Quái ---
  # Tần suất spawn mỗi đợt (ticks): 40 ticks = 2 giây
  spawn-interval-ticks: 40
  # Số con tối thiểu/tối đa mỗi đợt spawn dãn cách
  spawn-batch-min: 3
  spawn-batch-max: 5
  # Công thức tổng quái trong wave: base * level ^ power
  wave-mob-formula-base: 25
  wave-mob-formula-power: 1.75

  # --- Cơ chế Độ Khó Tịnh Tiến ---
  # Hệ số tăng sức mạnh quái mỗi lần "Gọi Raid" bổ sung (+20%/lần)
  call-scaling-factor: 1.20
  # Hệ số tăng sức mạnh quái theo tổng số trận đã diễn ra (+5%/trận)
  total-raid-scaling-factor: 1.05

  # --- Hành Vi AI Quái Công Thành ---
  # Số tick giữa 2 lần quái tấn công Lõi trực tiếp (20 ticks = 1 giây)
  mob-ai-attack-interval-ticks: 20
  # Số tick tích lũy để quái phá được 1 block cản đường
  block-break-ticks-threshold: 3
  # Khoảng cách (block) tối thiểu quái phải vào để tấn công Lõi
  core-attack-range: 4.0
  # Khoảng cách coi là quái đứng im (block/giây)
  stuck-distance-threshold: 0.2
  # Số giây liên tiếp đứng im trước khi kích hoạt xử lý kẹt
  stuck-seconds-threshold: 2

  # --- HP Cơ Bản Quái (Base HP theo GDD) ---
  mob-base-hp:
    VINDICATOR: 150.0
    GHAST: 100.0
    RAVAGER: 1500.0
    EVOKER: 200.0
    SKELETON: 120.0
    PHANTOM: 150.0
    GIANT: 10000.0
    DEFAULT: 100.0

  # --- Sát Thương Quái Vào Lõi ---
  mob-core-damage:
    DEFAULT: 50.0
    GIANT: 300.0
    RAVAGER: 150.0
    VINDICATOR: 40.0
    EVOKER: 30.0

  # --- Cấu hình Bỏ qua Raid ---
  skip-shield-duration-hours: 2.0

  # --- Cấu hình Elite Boss (Mini-Boss) ---
  elite-boss:
    spawn-chance: 0.01             # Tỷ lệ xuất hiện Elite Boss tự nhiên ở Wave cuối (0.01 = 1%)
    hp-multiplier: 2.0             # Hệ số nhân lượng HP của Elite Boss
    damage-multiplier: 1.5         # Hệ số nhân sát thương của Elite Boss
    min-enchant-lines: 1           # Số dòng phù phép ngẫu nhiên tối thiểu cho trang bị cực phẩm nhận được
    max-enchant-lines: 15          # Số dòng phù phép ngẫu nhiên tối đa cho trang bị cực phẩm nhận được
    display-name-prefix: "&6★ ELITE BOSS ★ " # Tiền tố tên hiển thị màu vàng rực rỡ của Elite Boss
    spawn-sound: "ENTITY_WITHER_SPAWN" # Âm thanh xuất hiện hùng tráng
    spawn-warning-message: "&6★ SIÊU CẤP MINI-BOSS ★ &cMột &eElite Boss &ccực kỳ nguy hiểm đã xuất hiện tại Wave cuối của Lõi Liên Minh &e%alliance%&c! Hãy hợp lực cùng các dũng sĩ tiêu diệt!" # Thông báo triệu hồi Elite Boss
    reward-message: "&6[Mini-boss] Bạn nhận được: &e%item% &dvới &a%count% &ddòng Phù Phép!" # Thông điệp nhận thưởng trực tiếp

# ------------------------------------------------------------------------------
# 7. CHIẾN TRANH LIÊN MINH (PVP SIEGE MODE)
# ------------------------------------------------------------------------------
siege-settings:
  preparation-time-seconds: 300
  war-duration-seconds: 1800
  defender-shield-regen-penalty-percent: 50
  void-wall-cooldown-seconds: 600
  capture-time-seconds: 60
  siege-flag-cost: 20000.0
  # ----------------------------------------------------------------------------
  # PHẦN THƯỞNG CHIẾN THẮNG & HỆ QUẢ BẠI TRẬN (VICTORY & PENALTY SETTINGS)
  # ----------------------------------------------------------------------------
  post-war-options:
    # Thời gian (giờ) phe thắng có quyền quyết định Số phận của phe thua kể từ khi chiến tranh kết thúc
    decision-window-hours: 24

    # 1. Chế độ Áp Thuế (Taxation Mode)
    taxation:
      enabled: true
      # Phần trăm số tiền phe thua kiếm được từ Hệ thống/Quái vật/Chợ sẽ tự động chuyển vào quỹ phe thắng
      min-tax-percent: 5
      max-tax-percent: 25
      default-tax-percent: 10
      # Thời gian áp thuế tối đa (ngày) trước khi phe thua được giải phóng trở lại tự do
      max-tax-duration-days: 7
      # Số tiền (Money) tối đa có thể bòn rút từ phe thua mỗi ngày (Tránh làm phá sản người chơi cũ)
      daily-tax-cap: 500000.0

    # 2. Chế độ Trục Xuất / Đuổi đi (Expulsion / Migration Mode)
    expulsion:
      enabled: true
      # Phí bồi thường (Money) phe thắng phải trả cho hệ thống để cưỡng chế di dời Lõi (Core) của phe thua
      # Phí = Cấp Lõi phe thua * multiplier
      forced-migrate-cost-multiplier: 100000.0
      # Thời gian đếm ngược (giờ) để phe thua thu dọn đồ đạc, rương hòm trước khi vùng đất bị xóa hoàn toàn
      eviction-grace-period-hours: 12
      # Phe bị đuổi đi có được hoàn trả lại một phần Shard nâng cấp Lõi trước đó không? (%)
      shard-refund-percent: 30.0

# ------------------------------------------------------------------------------
# 7. CẤU HÌNH NPC KIẾN THIẾT (BUILDER NPC SETTINGS)
# ------------------------------------------------------------------------------
builder-settings:
  enabled: true
  # Chi phí thuê NPC Kiến Thiết (Mason)
  hire-cost-money: 150000.0
  hire-cost-shards: 15
  # Tốc độ tái thiết mặc định nếu không tìm thấy cấp độ cụ thể (số block mỗi giây)
  rebuild-blocks-per-second: 5
  # Giới hạn chiều cao quét bản vẽ thiết kế (so với cao độ của Lõi)
  scan-height-below: 5
  scan-height-above: 15
  # Tốc độ tái thiết chi tiết theo từng cấp độ của Thợ Xây (số block mỗi giây)
  levels:
    1: 2
    2: 5
    3: 10
    4: 15
    5: 25

# ------------------------------------------------------------------------------
# 8. CẤU HÌNH HIỆU ỨNG HẠT (PARTICLES)
# ------------------------------------------------------------------------------
particle-settings:
  tower-happy: "HAPPY_VILLAGER"
  farmer-happy: "HAPPY_VILLAGER"
