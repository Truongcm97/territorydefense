  low-health-warning-threshold: 0.20

  # Cấu hình cấp độ tiến trình của Lõi
  levels:
    1:
      radius: 30
      max-shield: 1000.0
      max-fep: 2000.0
      max-towers: 3
      upgrade-cost-money: 0.0
      upgrade-cost-shards: 0
    2:
      radius: 50
      max-shield: 2500.0
      max-fep: 6000.0
      max-towers: 7
      upgrade-cost-money: 100000.0
      upgrade-cost-shards: 10
    3:
      radius: 70
      max-shield: 5000.0
      max-fep: 16000.0
      max-towers: 12
      upgrade-cost-money: 500000.0
      upgrade-cost-shards: 20
    4:
      radius: 90
      max-shield: 10000.0
      max-fep: 40000.0
      max-towers: 17
      upgrade-cost-money: 2000000.0
      upgrade-cost-shards: 50
    5:
      radius: 110
      max-shield: 20000.0
